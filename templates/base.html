<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Spam Detector{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand">
            <a href="/" style="font-size: 22px; font-weight: 700; color: white; text-decoration: none;">
                <i class="fa-solid fa-shield-halved" style="color: var(--nav-hover);"></i> SpamGuard
            </a>
        </div>

        <div class="nav-links">
            {% if current_user.is_authenticated %}
            <a href="/">Dashboard</a>
            <a href="/history">History</a>
            <a href="/trends">Trends</a>
            <a href="/inbox">Live Inbox</a>
            {% endif %}
        </div>

        <div class="nav-actions">
            <button id="theme-toggle" class="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </button>

            {% if current_user.is_authenticated %}
            <div class="bell-container" onclick="window.location.href='/alerts_page'">
                <i class="fa-solid fa-bell"></i>
                <span class="bell-badge" id="notification-badge" style="display: none;">0</span>
            </div>

            <a href="/logout" style="color: white; margin-left: 15px; text-decoration: none; font-size: 16px;">
                <i class="fa-solid fa-sign-out-alt"></i> Logout
            </a>
            {% else %}
            <a href="/login" style="color: white; text-decoration: none; font-size: 16px;">Login</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <div class="alerts-panel"></div>

    <script>
        // Theme logic
        const toggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.innerHTML = '<i class="fa-solid fa-sun" style="color: #FCBF49;"></i>';
        }

        toggleBtn.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.innerHTML = '<i class="fa-solid fa-sun" style="color: #FCBF49;"></i>';
            }
        });

        {% if current_user.is_authenticated %}
        let previousAlertCount = -1;
        async function checkAlerts() {
            try {
                const res = await fetch("/alerts");
                const data = await res.json();
                const currentAlertCount = data.total_count;
                
                const badge = document.getElementById("notification-badge");
                if (currentAlertCount > 0) {
                    badge.innerText = currentAlertCount;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }

                if (previousAlertCount !== -1 && currentAlertCount > previousAlertCount) {
                    const newAlertsCount = currentAlertCount - previousAlertCount;
                    const alertsToShow = newAlertsCount > 10 ? 10 : newAlertsCount;
                    const newAlerts = data.alerts.slice(-alertsToShow);
                    
                    const panel = document.querySelector(".alerts-panel");
                    newAlerts.forEach(alert => {
                        const div = document.createElement("div");
                        div.className = "popup";
                        div.innerHTML = `
                            <strong>📩 New Email: ${alert.subject}</strong>
                            <div style="margin-top: 5px; opacity: 0.9;">${alert.body.substring(0, 50)}...</div>
                        `;
                        panel.appendChild(div);
                        setTimeout(() => { div.remove(); }, 8000);
                    });
                }
                
                previousAlertCount = currentAlertCount;
            } catch (e) { console.error("Error fetching alerts", e); }
        }
        checkAlerts();
        setInterval(checkAlerts, 5000);
        {% endif %}
    </script>

</body>

</html>
