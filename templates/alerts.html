{% extends "base.html" %}
{% block title %}Email Alerts - SpamGuard{% endblock %}

{% block content %}

<div class="container">

    <h1 style="
        text-align: center;
        color: var(--text-color);
        margin-bottom: 35px;
        font-size: 46px;
        font-weight: 800;
    ">
        <i class="fa-solid fa-bell" style="color: var(--btn-bg);"></i>
        Recent Notifications
    </h1>

    <div id="alerts-list"></div>

</div>

<script>

async function loadAlerts() {

    try {

        const res = await fetch("/alerts");

        const data = await res.json();

        const box = document.getElementById("alerts-list");

        box.innerHTML = "";

        if (data.alerts.length === 0) {

            box.innerHTML = `

                <div style="
                    text-align: center;
                    padding: 50px;
                    opacity: 0.7;
                    background: white;
                    border-radius: 20px;
                ">

                    <i class="fa-solid fa-inbox"
                       style="
                            font-size: 55px;
                            margin-bottom: 20px;
                            color: #888;
                       ">
                    </i>

                    <p style="font-size: 18px;">
                        No recent notifications found.
                    </p>

                </div>

            `;

            return;
        }

        data.alerts.reverse().forEach(a => {

            box.innerHTML += `

            <div class="result-card ${ a.type === 'spam' ? 'spam' : 'ham' }"

                 style="
                    margin-top: 22px;
                    padding: 24px;
                    border-radius: 20px;
                    background: #eef8ee;
                    border-left: 7px solid #36a546;
                    box-shadow: 0 5px 14px rgba(0,0,0,0.08);
                 ">

                <div style="
                    display: flex;
                    justify-content: space-between;
                    align-items: flex-start;
                    gap: 20px;
                ">

                    <div style="flex: 1;">

                        <h2 style="
                            font-size: 26px;
                            margin-bottom: 15px;
                            color: #1d6b2b;
                            line-height: 1.4;
                            font-weight: 700;
                            word-break: break-word;
                        ">

                            ${
                                a.type === 'spam'
                                ?
                                '<i class="fa-solid fa-triangle-exclamation"></i> SPAM: '
                                :
                                '<i class="fa-solid fa-envelope"></i> '
                            }

                            ${a.subject}

                        </h2>

                        <div style="
                            background: rgba(255,255,255,0.75);
                            padding: 16px;
                            border-radius: 14px;
                            font-size: 17px;
                            line-height: 1.8;
                            color: #444;
                            white-space: pre-wrap;
                            word-break: break-word;
                        ">

                            ${a.body}

                        </div>

                    </div>

                    <a href="${a.link}"

                       target="_blank"

                       class="auth-btn"

                       style="
                            padding: 10px 18px;
                            font-size: 15px;
                            width: auto;
                            background: var(--nav-bg);
                            text-decoration: none;
                            border-radius: 10px;
                            display: inline-flex;
                            align-items: center;
                            gap: 8px;
                            height: fit-content;
                            white-space: nowrap;
                       ">

                        <i class="fa-solid fa-arrow-up-right-from-square"></i>

                        Open Mail

                    </a>

                </div>

            </div>

            `;
        });

    }

    catch (e) {

        console.error("Error loading alerts:", e);

    }
}

setInterval(loadAlerts, 5000);

loadAlerts();

</script>

{% endblock %}
