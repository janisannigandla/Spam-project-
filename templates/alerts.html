{% extends "base.html" %}
{% block title %}Email Alerts - SpamGuard{% endblock %}

{% block content %}

<div class="container">

    <h1 style="
        text-align:center;
        color:var(--text-color);
        margin-bottom:30px;
        font-size:46px;        font-weight:800;
    ">

<i class="fa-solid fa-bell" style="color:#dc3545;"></i>
        Recent Notifications
    </h1>

    <div id="alerts-list"></div>

</div>

<script>

async function loadAlerts() {

    try {

        const response = await fetch("/alerts");
        const data = await response.json();

        const container = document.getElementById("alerts-list");

        container.innerHTML = "";

        if (!data.alerts || data.alerts.length === 0) {

            container.innerHTML = `
                <div style="
                    background:white;
                    padding:50px;
                    border-radius:20px;
                    text-align:center;
                    box-shadow:0 4px 12px rgba(0,0,0,.08);
                ">
                    <i class="fa-solid fa-inbox"
                       style="
                           font-size:60px;
                           color:#999;
                           margin-bottom:15px;
                       ">
                    </i>

                    <h3>No Notifications Found</h3>
                </div>
            `;

            return;
        }

        data.alerts.reverse().forEach((alert, index) => {

            const title =
                alert.email_subject ||
                alert.subject ||
                "Email Notification";

            const message =
                alert.message ||
                alert.body ||
                "";

            const sender =
                alert.sender ||
                "Unknown Sender";

            const spamScore =
                alert.spam_score || "";

            const alertType =
                alert.alert_type ||
                "spam";

            const badgeColor =
                alertType === "spam"
                ? "#dc3545"
                : "#198754";

            const badgeText =
                alertType === "spam"
                ? "SPAM"
                : "EMAIL";

            container.innerHTML += `

                <div style="
                    background:white;
                    border-radius:18px;
                    margin-bottom:16px;
                    padding:20px;
                    box-shadow:0 4px 14px rgba(0,0,0,.08);
                    transition:0.2s;
                    cursor:pointer;
                    border-left:6px solid ${badgeColor};
                ">

                    <div style="
                        display:flex;
                        justify-content:space-between;
                        align-items:center;
                        margin-bottom:12px;
                    ">

                        <span style="
                            background:${badgeColor};
                            color:white;
                            padding:6px 12px;
                            border-radius:20px;
                            font-size:13px;
                            font-weight:700;
                        ">
                            ${badgeText}
                        </span>

                        <span style="
                            color:#888;
                            font-size:13px;
                        ">
                            ${alert.time || ""}
                        </span>

                    </div>

                    <div style="
                        font-size:22px;
                        font-weight:700;
                        color:#222;
                        margin-bottom:10px;
                    ">
                        ${title}
                    </div>

                    <div style="
                        color:#555;
                        line-height:1.7;
                        margin-bottom:12px;
                    ">
                        ${message}
                    </div>

                    <div style="
                        color:#666;
                        font-size:15px;
                    ">
                        <strong>From:</strong> ${sender}
                    </div>

                    ${
                        spamScore
                        ?
                        `
                        <div style="
                            margin-top:10px;
                            color:#dc3545;
                            font-weight:700;
                        ">
                            Spam Score: ${spamScore}%
                        </div>
                        `
                        :
                        ''
                    }

                    <div style="
    display:flex;
    gap:20px;
    margin-top:15px;
    font-size:14px;
    font-weight:600;
">

    <a href="/view_alert/${index}">
        View Details
    </a>

    <a href="${alert.gmail_link || 'https://mail.google.com'}"
       target="_blank">
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
        Open Mail
    </a>

</div>

                </div>
            `;
        });

    }

    catch(error) {

        console.error(error);

    }
}

loadAlerts();

    setInterval(loadAlerts, 5000);

</script>

{% endblock %}
